# Fail2Ban filter for excessive 404 errors (vulnerability scanners)
# Catches IPs that are probing for non-existent files

[Definition]

# Match nginx access log 404 entries
# Log format: $remote_addr - $remote_user [$time_local] "$request" $status ...
failregex = ^<HOST> .* "(GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH) [^"]+" 404 

# Ignore legitimate 404s and mobile app traffic
# ExpoGo/React Native user agents should not be penalized for API 404s
ignoreregex = ^<HOST> .* "GET /health 
              ^<HOST> .* "GET /favicon\.ico 
              ^<HOST> .* "GET /robots\.txt 
              ^<HOST> .* "(GET|POST|PUT|PATCH|DELETE) /api/.*" 404 .*"(Expo|okhttp|React|Darwin)
              ^<HOST> .* "GET /api/.*" 404 

