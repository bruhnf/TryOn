# Fail2Ban filter for WordPress probes (we don't run WordPress)
# Instant ban for common WordPress vulnerability scans

[Definition]

# Match WordPress-specific paths
failregex = ^<HOST> .* "(GET|POST) /wp-
            ^<HOST> .* "(GET|POST) /wordpress/
            ^<HOST> .* "(GET|POST) /wp-admin
            ^<HOST> .* "(GET|POST) /wp-content
            ^<HOST> .* "(GET|POST) /wp-includes
            ^<HOST> .* "(GET|POST) /xmlrpc\.php

ignoreregex = 

