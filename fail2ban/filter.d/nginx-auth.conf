# Fail2Ban filter for failed authentication attempts

[Definition]

# Match failed login/signup attempts (4xx responses on auth endpoints)
failregex = ^<HOST> .* "POST /api/auth/login HTTP[^"]+" (401|403|429)
            ^<HOST> .* "POST /api/auth/signup HTTP[^"]+" (400|409|429)
            ^<HOST> .* "POST /api/auth/forgot-password HTTP[^"]+" 429

# Don't count normal failed logins from mobile apps too aggressively
# The app may retry on network issues - only penalize clear brute force
ignoreregex = 

