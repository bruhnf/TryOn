# Fail2Ban filter for malicious bots and scanners

[Definition]

# Match requests with suspicious patterns
# Note: %% is escaped % for Python ConfigParser
failregex = ^<HOST> .* "(GET|POST) .*(\.\./|\.\.\\ |\x00|%%00)
            ^<HOST> .* "(GET|POST) .*(select.*from|union.*select|insert.*into|delete.*from|drop.*table|update.*set)
            ^<HOST> .* "(GET|POST) .*(<script|javascript:|onerror=|onload=)
            ^<HOST> .* "(GET|POST) /.*\.(cgi|asp|aspx|jsp|dll)
            ^<HOST> .* "[\x00-\x1f]

ignoreregex = 

